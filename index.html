/* ═══════════════════════════════════════════════
   CRITERIA PAGE — clean single-column layout
   ═══════════════════════════════════════════════ */
function CriteriaPage(props){
  var profiles=props.profiles,setProfiles=props.setProfiles,snap=props.snap,items=props.items,setEditId=props.setEditId,segments=props.segments||[];
  var _ap=useState(0),activeProf=_ap[0],setActiveProf=_ap[1];
  var _ec=useState(null),editCritId=_ec[0],setEditCritId=_ec[1];
  var _showLib=useState(false),showLib=_showLib[0],setShowLib=_showLib[1];
  var _showRef=useState(false),showRef=_showRef[0],setShowRef=_showRef[1];
  var _refFilter=useState('all'),refFilter=_refFilter[0],setRefFilter=_refFilter[1];
  var _activeSeg=useState(null),activeSeg=_activeSeg[0],setActiveSeg=_activeSeg[1];
  var _expandedConcern=useState(null),expandedConcern=_expandedConcern[0],setExpandedConcern=_expandedConcern[1];

  var prof=profiles[activeProf]||profiles[0];
  if(!prof)return null;
  var criteria=prof.criteria||[];
  var totalWeight=criteria.reduce(function(s,c){return s+c.weight;},0);
  var maxW=Math.max.apply(null,criteria.map(function(c){return c.weight;}).concat([1]));

  function updProf(changes){
    snap();setProfiles(function(prev){return prev.map(function(p,i){return i===activeProf?Object.assign({},p,changes):p;});});
  }
  function updCrit(cid,changes){
    snap();setProfiles(function(prev){return prev.map(function(p,i){
      if(i!==activeProf)return p;
      return Object.assign({},p,{criteria:p.criteria.map(function(c){return c.id===cid?Object.assign({},c,changes):c;})});
    });});
  }
  function delCrit(cid){
    snap();setProfiles(function(prev){return prev.map(function(p,i){
      if(i!==activeProf)return p;
      return Object.assign({},p,{criteria:p.criteria.filter(function(c){return c.id!==cid;})});
    });});setEditCritId(null);
  }
  function addCrit(){
    snap();var nid=uid();
    setProfiles(function(prev){return prev.map(function(p,i){
      if(i!==activeProf)return p;
      return Object.assign({},p,{criteria:p.criteria.concat([{id:nid,name:'New Criterion',desc:'Describe what buyers care about.',weight:5,sourceIds:[]}])});
    });});setEditCritId(nid);
  }
  function addFromLib(libItem){
    snap();var exists=criteria.some(function(c){return c.name===libItem.name;});
    if(exists)return;
    var nid=uid();
    setProfiles(function(prev){return prev.map(function(p,i){
      if(i!==activeProf)return p;
      return Object.assign({},p,{criteria:p.criteria.concat([{id:nid,name:libItem.name,desc:libItem.desc,weight:5,sourceIds:[]}])});
    });});
  }
  function addProfile(){
    snap();var newProf=makeProfile('Offering '+(profiles.length+1),'s1',{
      'Speed to Occupancy':10,'Total Cost Transparency':10,'Design Quality & Experience':10,
      'Post-Move Support':10,'Single Point of Contact':10,'Scalability & Flexibility':10,
      'Sustainability & ESG':10,'Technology Integration':10,'Brand & Reputation':10,'Accessibility & Compliance':10});
    setProfiles(function(prev){return prev.concat([newProf]);});
    setActiveProf(profiles.length);
  }
  function delProfile(idx){
    if(profiles.length<=1)return;snap();
    setProfiles(function(prev){return prev.filter(function(_,i){return i!==idx;});});
    if(activeProf>=profiles.length-1)setActiveProf(Math.max(0,profiles.length-2));
  }
  function normalize(){
    if(totalWeight===0)return;snap();var factor=100/totalWeight;
    setProfiles(function(prev){return prev.map(function(p,i){
      if(i!==activeProf)return p;
      return Object.assign({},p,{criteria:p.criteria.map(function(c){return Object.assign({},c,{weight:Math.round(c.weight*factor)});})});
    });});
  }
  function linkSource(critId,itemId){
    snap();setProfiles(function(prev){return prev.map(function(p,i){
      if(i!==activeProf)return p;
      return Object.assign({},p,{criteria:p.criteria.map(function(c){
        if(c.id!==critId)return c;
        var sids=c.sourceIds||[];
        if(sids.includes(itemId))return Object.assign({},c,{sourceIds:sids.filter(function(x){return x!==itemId;})});
        return Object.assign({},c,{sourceIds:sids.concat([itemId])});
      })});
    });});
  }

  var editCrit=editCritId?criteria.find(function(c){return c.id===editCritId;}):null;

  /* Framework ref data */
  var activeItems=items.filter(function(i){return i.on;});
  var refItems=refFilter==='all'?activeItems:activeItems.filter(function(i){return fwSource(i.framework)===refFilter;});

  /* ── Factor intelligence ── */
  var factorsByConcern=useMemo(function(){
    var grouped={};
    /* If segment selected, filter factors to that segment; otherwise use all */
    var pool=activeItems;
    if(activeSeg){
      var seg=segments.find(function(s){return s.id===activeSeg;});
      if(seg){
        pool=activeItems.filter(function(it){
          if(!it.tags)return false;var t=it.tags;
          var mS=(seg.sizes||[]).length>0&&(t.sizes||[]).some(function(v){return seg.sizes.indexOf(v)>=0;});
          var mP=(seg.provs||[]).length>0&&(t.provs||[]).some(function(v){return seg.provs.indexOf(v)>=0;});
          var mI=(seg.inds||[]).length>0&&(t.inds||[]).some(function(v){return seg.inds.indexOf(v)>=0;});
          return mS||mP||mI;
        });
      }
    }
    pool.forEach(function(it){
      if(!it.tags||!it.tags.concerns)return;
      it.tags.concerns.forEach(function(cid){
        if(!grouped[cid])grouped[cid]=[];
        grouped[cid].push(it);
      });
    });
    return grouped;
  },[activeItems,activeSeg,segments]);

  /* Map each criterion to its concern */
  var critFactorMap=useMemo(function(){
    var map={};
    criteria.forEach(function(c){
      var shortKey=null;
      Object.keys(CRIT_KEY_MAP).forEach(function(k){if(CRIT_KEY_MAP[k]===c.name)shortKey=k;});
      var concernId=shortKey?CRIT_TO_CONCERN[shortKey]:null;
      var factors=concernId&&factorsByConcern[concernId]?factorsByConcern[concernId]:[];
      var opps=factors.filter(function(f){return f.direction==='opportunity'||f.direction==='strength';}).length;
      var threats=factors.filter(function(f){return f.direction==='threat'||f.direction==='weakness';}).length;
      map[c.id]={concernId:concernId,factors:factors,opps:opps,threats:threats};
    });
    return map;
  },[criteria,factorsByConcern]);

  /* Build concern cards data — ALL concerns with factors, whether covered or not */
  var concernCards=useMemo(function(){
    var coveredConcerns={};
    criteria.forEach(function(c){
      var shortKey=null;
      Object.keys(CRIT_KEY_MAP).forEach(function(k){if(CRIT_KEY_MAP[k]===c.name)shortKey=k;});
      if(shortKey&&CRIT_TO_CONCERN[shortKey])coveredConcerns[CRIT_TO_CONCERN[shortKey]]=c.id;
    });
    return CONCERNS.map(function(cn){
      var factors=factorsByConcern[cn.id]||[];
      var opps=factors.filter(function(f){return f.direction==='opportunity'||f.direction==='strength';}).length;
      var threats=factors.filter(function(f){return f.direction==='threat'||f.direction==='weakness';}).length;
      /* Find matching library item */
      var libMatch=null;
      CRIT_LIB.forEach(function(cat){cat.items.forEach(function(li){
        if(libMatch)return;
        var sk=null;Object.keys(CRIT_KEY_MAP).forEach(function(k){if(CRIT_KEY_MAP[k]===li.name)sk=k;});
        if(sk&&CRIT_TO_CONCERN[sk]===cn.id)libMatch=li;
      });});
      return{concern:cn,factors:factors,opps:opps,threats:threats,coveredCritId:coveredConcerns[cn.id]||null,libMatch:libMatch};
    }).filter(function(d){return d.factors.length>0;}).sort(function(a,b){return b.factors.length-a.factors.length;});
  },[criteria,factorsByConcern]);

  var linkedSeg=prof.segmentId?segments.find(function(s){return s.id===prof.segmentId;}):null;
  var totalFactors=concernCards.reduce(function(s,d){return s+d.factors.length;},0);

  /* ── Segment-adjusted weights ── */
  var segWeights=useMemo(function(){
    if(!activeSeg)return null;
    var seg=segments.find(function(s){return s.id===activeSeg;});
    if(!seg)return null;
    return getSegWeights(seg.name);
  },[activeSeg,segments]);

  /* Apply segment weights to criteria for display */
  var displayCriteria=useMemo(function(){
    if(!segWeights)return criteria.map(function(c){return Object.assign({},c,{segWeight:null});});
    return criteria.map(function(c){
      var ck=CRIT_NAME_TO_KEY[c.name];
      var sw=ck&&segWeights[ck]!==undefined?segWeights[ck]:c.weight;
      return Object.assign({},c,{segWeight:sw});
    });
  },[criteria,segWeights]);

  var displayTotal=displayCriteria.reduce(function(s,c){return s+(c.segWeight!==null?c.segWeight:c.weight);},0);
  var displayMax=Math.max.apply(null,displayCriteria.map(function(c){return c.segWeight!==null?c.segWeight:c.weight;}).concat([1]));

  /* Sort by display weight desc for cards */
  var sortedCriteria=displayCriteria.slice().sort(function(a,b){
    var wa=a.segWeight!==null?a.segWeight:a.weight;
    var wb=b.segWeight!==null?b.segWeight:b.weight;
    return wb-wa;
  });

  /* Shorthand for weight value */
  function wVal(c){return c.segWeight!==null?c.segWeight:c.weight;}

  return h('div',null,
    /* ═══ HEADER ═══ */
    h('div',{style:{marginBottom:12}},
      h('h1',{style:{fontSize:20,fontWeight:700,letterSpacing:'-.02em',marginBottom:4}},'Buyer Criteria'),
      h('p',{style:{fontSize:12,color:'#888'}},'What matters most to each buyer segment. Select a segment to see how criteria importance shifts.')

              background:active?'#111':'#fff',color:active?'#fff':'#666',cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
            stLabel&&h('span',{style:{fontSize:8,fontWeight:700,background:active?'rgba(255,255,255,.2)':'#f0f0f0',padding:'1px 4px',borderRadius:3,color:active?'#fff':'#999'}},stLabel),
            p.name);
        }),
        h('button',{onClick:addProfile,style:{padding:'4px 8px',borderRadius:6,border:'1px dashed #ddd',background:'#fff',fontSize:12,color:'#bbb',cursor:'pointer'}},'+')
      ),
      /* Segment filter */
      segments.length>0&&h('div',{style:{display:'flex',alignItems:'center',gap:6,marginLeft:'auto'}},
        h('span',{style:{fontSize:9,fontWeight:700,color:'#999',textTransform:'uppercase',letterSpacing:'.04em'}},'Segment'),
        h('button',{onClick:function(){setActiveSeg(null);},

            border:!activeSeg?'none':'1px solid #e5e5e5',background:!activeSeg?'#2563eb':'#fff',
            color:!activeSeg?'#fff':'#666',cursor:'pointer'}},'All'),
        segments.map(function(seg){

          return h('button',{key:seg.id,onClick:function(){setActiveSeg(active?null:seg.id);},
            style:{padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,

/* ═══════════════════════════════════════════════
   TARGET MARKET — DATA SLICER
   ═══════════════════════════════════════════════ */
function fmt(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(n>=1e4?0:1)+'K';return String(n);}
function fmtD(n){if(n>=1e9)return'C$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'C$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'C$'+(n/1e3).toFixed(0)+'K';return'C$'+n;}

function TargetMarketPage(props){
  var segments=props.segments,setSegments=props.setSegments,snap=props.snap;
  var items=props.items||[],setEditId=props.setEditId;
  var profiles=props.profiles||[],setProfiles=props.setProfiles;
  var _fp=useState([]),fProvs=_fp[0],setFProvs=_fp[1];
  var _fi=useState([]),fInds=_fi[0],setFInds=_fi[1];
  var _fs=useState([]),fSizes=_fs[0],setFSizes=_fs[1];
  var _fo=useState(false),offOnly=_fo[0],setOffOnly=_fo[1];
  var _segName=useState(''),segName=_segName[0],setSegName=_segName[1];
  var _segSaved=useState(false),segSaved=_segSaved[0],setSegSaved=_segSaved[1];
  var _segPopup=useState(false),segPopup=_segPopup[0],setSegPopup=_segPopup[1];
  var _tab=useState('dashboard'),tab=_tab[0],setTab=_tab[1];

  function tog(arr,set,v){set(function(p){return p.includes(v)?p.filter(function(x){return x!==v;}):p.concat([v]);});}

  /* ── Filtered data ── */
  var filtered=useMemo(function(){
    return BIZ_DATA.filter(function(r){
      if(fProvs.length&&!fProvs.includes(r.prov))return false;
      if(fInds.length&&!fInds.includes(r.ind))return false;
      if(fSizes.length&&!fSizes.includes(r.size))return false;
      return true;
    });
  },[fProvs,fInds,fSizes]);

  var totalBiz=filtered.reduce(function(s,r){return s+r.count;},0);
  var officeBiz=filtered.reduce(function(s,r){return s+r.offCount;},0);
  var displayBiz=offOnly?officeBiz:totalBiz;

  var byInd=useMemo(function(){
    var m={};filtered.forEach(function(r){
      if(!m[r.ind])m[r.ind]={count:0,offCount:0,wtdDeal:0,offWtdDeal:0};
      var sz=BIZ_SIZES.find(function(x){return x.id===r.size;});
      var ind=INDUSTRIES.find(function(x){return x.id===r.ind;});
      var dealVal=ind?ind.deal*(sz?sz.deal:1):0;
      m[r.ind].count+=r.count;m[r.ind].offCount+=r.offCount;
      m[r.ind].wtdDeal+=r.count*dealVal;m[r.ind].offWtdDeal+=r.offCount*dealVal;
    });
    return INDUSTRIES.map(function(ind){
      var d=m[ind.id]||{count:0,offCount:0,wtdDeal:0,offWtdDeal:0};
      var cnt=offOnly?d.offCount:d.count;
      var wd=offOnly?d.offWtdDeal:d.wtdDeal;
      var avgD=cnt>0?Math.round(wd/cnt):ind.deal;
      return{id:ind.id,l:ind.s,c:ind.c,full:ind.l,count:cnt,deal:avgD,baseDeal:ind.deal};
    }).filter(function(x){return x.count>0;}).sort(function(a,b){return b.count-a.count;});
  },[filtered,offOnly]);

  var bySize=useMemo(function(){
    var m={};filtered.forEach(function(r){
      if(!m[r.size])m[r.size]={count:0,offCount:0};
      m[r.size].count+=r.count;m[r.size].offCount+=r.offCount;
    });
    return BIZ_SIZES.map(function(sz){
      var d=m[sz.id]||{count:0,offCount:0};
      return{id:sz.id,l:sz.l,count:offOnly?d.offCount:d.count,mid:sz.mid,dealMul:sz.deal};
    });
  },[filtered,offOnly]);

  var byProv=useMemo(function(){
    var m={};filtered.forEach(function(r){
      if(!m[r.prov])m[r.prov]={count:0,offCount:0};
      m[r.prov].count+=r.count;m[r.prov].offCount+=r.offCount;
    });
    return PROVS.map(function(pv){
      var d=m[pv.id]||{count:0,offCount:0};
      return{id:pv.id,l:pv.l,count:offOnly?d.offCount:d.count};
    }).sort(function(a,b){return b.count-a.count;});
  },[filtered,offOnly]);

  /* ── Funnel ── */
  var tam=totalBiz,sam=officeBiz,lc=Math.round(sam*.17),som=Math.round(lc*.10);
  var wtdDeal=byInd.reduce(function(s,x){return s+x.count*x.deal;},0);
  var avgDeal=displayBiz>0?Math.round(wtdDeal/displayBiz):0;
  /* SAM-weighted deal (office-based industries skew higher) */
  var samDeal=useMemo(function(){
    var sw=0,sc=0;
    filtered.forEach(function(r){
      var ind=INDUSTRIES.find(function(x){return x.id===r.ind;});
      var sz=BIZ_SIZES.find(function(x){return x.id===r.size;});
      if(!ind)return;var dealVal=ind.deal*(sz?sz.deal:1);
      sw+=r.offCount*dealVal;sc+=r.offCount;
    });return sc>0?Math.round(sw/sc):avgDeal;
  },[filtered,avgDeal]);
  var tamRev=wtdDeal,samRev=sam*samDeal,lcRev=lc*samDeal,somRev=som*samDeal;

  /* ── ICP demographics ── */
  var icp=useMemo(function(){
    var tw=0,a={fem:0,immig:0,avgAge:0,growth:0,tech:0,remote:0,degree:0};
    byInd.forEach(function(d){
      var dm=IND_DEMO[d.id];if(!dm)return;tw+=d.count;
      a.fem+=dm.fem*d.count;a.immig+=dm.immig*d.count;a.avgAge+=dm.avgAge*d.count;
      a.growth+=dm.growth*d.count;a.tech+=dm.tech*d.count;a.remote+=dm.remote*d.count;a.degree+=dm.degree*d.count;
    });
    if(!tw)return{fem:0,immig:0,avgAge:0,growth:0,tech:0,remote:0,degree:0,topRev:''};
    var tid=byInd[0]?byInd[0].id:'prof';
    return{fem:a.fem/tw,immig:a.immig/tw,avgAge:Math.round(a.avgAge/tw),growth:a.growth/tw,
      tech:a.tech/tw,remote:a.remote/tw,degree:a.degree/tw,topRev:(IND_DEMO[tid]||{}).rev||''};
  },[byInd]);

  /* ── Heatmap data ── */
  var hmData=useMemo(function(){
    var hm={},mx=1;
    BIZ_DATA.forEach(function(r){
      if(fProvs.length&&!fProvs.includes(r.prov))return;
      if(fInds.length&&!fInds.includes(r.ind))return;
      if(fSizes.length&&!fSizes.includes(r.size))return;
      var cnt=offOnly?r.offCount:r.count;
      var k=r.prov+'_'+r.ind;hm[k]=(hm[k]||0)+cnt;
      if(hm[k]>mx)mx=hm[k];
    });
    return{cells:hm,max:mx};
  },[fProvs,fInds,fSizes,offOnly]);

  function saveSeg(){
    snap();var nm=segName.trim()||('Segment '+(segments.length+1));
    var segId=uid();
    setSegments(function(p){return p.concat([{id:segId,name:nm,provs:fProvs.slice(),inds:fInds.slice(),sizes:fSizes.slice(),officeOnly:offOnly,color:['#2563eb','#7c3aed','#0891b2','#dc2626','#059669'][p.length%5]}]);});
    /* Auto-create a criteria profile for this segment if none exists with same name */
    if(setProfiles){
      var alreadyExists=profiles.some(function(p){return p.name===nm;});
      if(!alreadyExists){
        var newProf=makeProfile(nm,'s1',{
          'Speed to Occupancy':10,'Total Cost Transparency':10,'Design Quality & Experience':10,
          'Post-Move Support':10,'Single Point of Contact':10,'Scalability & Flexibility':10,
          'Sustainability & ESG':10,'Technology Integration':10,'Brand & Reputation':10,'Accessibility & Compliance':10});
        newProf.segmentId=segId;
        setProfiles(function(prev){return prev.concat([newProf]);});
      }
    }
    setSegName('');setSegSaved(true);setTimeout(function(){setSegSaved(false);},2000);
  }
  function loadSeg(s){setFProvs(s.provs||[]);setFInds(s.inds||[]);setFSizes(s.sizes||[]);setOffOnly(s.officeOnly||false);}
  function delSeg(i){snap();setSegments(function(p){return p.filter(function(_,j){return j!==i;});});}

  /* ── Related framework factors (LIVE — reacts to current filters) ── */
  var relatedFactors=useMemo(function(){
    if(!items.length)return[];
    /* Use current filter state, not saved segments */
    var aSizes=fSizes,aProvs=fProvs,aInds=fInds;
    /* If no filters active, nothing to match */
    if(!aSizes.length&&!aProvs.length&&!aInds.length)return[];
    return items.filter(function(it){
      if(!it.on||!it.tags)return false;
      var t=it.tags;
      var matchSize=aSizes.length>0&&(t.sizes||[]).some(function(v){return aSizes.indexOf(v)>=0;});
      var matchProv=aProvs.length>0&&(t.provs||[]).some(function(v){return aProvs.indexOf(v)>=0;});
      var matchInd=aInds.length>0&&(t.inds||[]).some(function(v){return aInds.indexOf(v)>=0;});
      return matchSize||matchProv||matchInd;
    }).map(function(it){
      /* Compute match reasons and match strength (how many dimensions matched) */
      var reasons=[];var strength=0;
      if(fSizes.length>0){var ms=(it.tags.sizes||[]).filter(function(v){return fSizes.indexOf(v)>=0;});if(ms.length){strength++;ms.forEach(function(v){reasons.push({l:v+' emp',c:'#2563eb',dim:'size'});});}}
      if(fProvs.length>0){var mp=(it.tags.provs||[]).filter(function(v){return fProvs.indexOf(v)>=0;});if(mp.length){strength++;mp.forEach(function(v){reasons.push({l:v,c:'#059669',dim:'prov'});});}}
      if(fInds.length>0){var mi=(it.tags.inds||[]).filter(function(v){return fInds.indexOf(v)>=0;});if(mi.length){strength++;mi.forEach(function(v){var ind=INDUSTRIES.find(function(x){return x.id===v;});reasons.push({l:ind?ind.s:v,c:ind?ind.c:'#888',dim:'ind'});});}}
      /* Also note unmatched dimensions for context */
      var mismatches=[];
      if(fSizes.length>0&&!(it.tags.sizes||[]).some(function(v){return fSizes.indexOf(v)>=0;})){mismatches.push('size');}
      if(fProvs.length>0&&!(it.tags.provs||[]).some(function(v){return fProvs.indexOf(v)>=0;})){mismatches.push('province');}
      if(fInds.length>0&&!(it.tags.inds||[]).some(function(v){return fInds.indexOf(v)>=0;})){mismatches.push('industry');}
      return{item:it,reasons:reasons,strength:strength,mismatches:mismatches};
    }).sort(function(a,b){return b.strength-a.strength||b.item.impact-a.item.impact;});
  },[items,fSizes,fProvs,fInds]);

  var factorOpps=relatedFactors.filter(function(f){return f.item.direction==='opportunity'||f.item.direction==='strength';}).length;
  var factorThreats=relatedFactors.filter(function(f){return f.item.direction==='threat'||f.item.direction==='weakness';}).length;

  var barMax=byInd.length?byInd[0].count:1;

  /* ── Treemap data ── */
  var treemapData=useMemo(function(){
    var items=[];
    byInd.forEach(function(ind){
      byProv.forEach(function(pv){
        var key=ind.id+'_'+pv.id;
        var cnt=0;
        filtered.forEach(function(r){
          if(r.ind===ind.id&&r.prov===pv.id){cnt+=offOnly?r.offCount:r.count;}
        });
        if(cnt>0)items.push({ind:ind.id,prov:pv.id,indLabel:ind.l,provLabel:pv.id,count:cnt,color:ind.c,deal:ind.deal});
      });
    });
    return items.sort(function(a,b){return b.count-a.count;});
  },[byInd,byProv,filtered,offOnly]);

  /* ── Top industry for ICP ── */
  var topInd=byInd[0]?byInd[0].id:'prof';
  var topBuyer=IND_BUYER[topInd]||IND_BUYER.prof;
  var topInfo=IND_INFO[topInd]||IND_INFO.prof;

  /* ── Weighted buyer behavior ── */
  var buyerProfile=useMemo(function(){
    if(!byInd.length)return topBuyer;
    var top3=byInd.slice(0,3);
    var tw=top3.reduce(function(s,x){return s+x.count;},0);
    if(!tw)return topBuyer;
    /* Merge triggers and pains from top 3 industries */
    var allTriggers=[],allPains=[];
    top3.forEach(function(d){
      var b=IND_BUYER[d.id];if(!b)return;
      b.triggers.forEach(function(t){if(allTriggers.indexOf(t)<0)allTriggers.push(t);});
      b.pains.forEach(function(p){if(allPains.indexOf(p)<0)allPains.push(p);});
    });
    var primary=IND_BUYER[top3[0].id]||topBuyer;
    return{triggers:allTriggers.slice(0,6),pains:allPains.slice(0,6),process:primary.process,timeline:primary.timeline,
      loyalty:primary.loyalty,sqft:primary.sqft,priceRange:primary.priceRange,remote_policy:primary.remote_policy,techNeeds:primary.techNeeds};
  },[byInd]);

  /* ── Dominant size bracket ── */
  var dominantSize=useMemo(function(){
    var best=null,bestCount=0;
    bySize.forEach(function(s){if(s.count>bestCount){bestCount=s.count;best=s.id;}});
    return best||'20-49';
  },[bySize]);
  var sizeProfile=SIZE_BUYER[dominantSize]||SIZE_BUYER['20-49'];
  /* When size filters are active, use size-specific data for buyer details */
  var hasSizeFilter=fSizes.length>0;

  function Pill(pp){
    return h('button',{onClick:pp.onClick,
      style:{padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,
        border:pp.active?'none':'1px solid #e5e5e5',
        background:pp.active?(pp.color||'#111'):'#fff',
        color:pp.active?'#fff':(pp.color||'#666'),cursor:'pointer',transition:'all .15s'}},pp.label);
  }

  var TABS=[
    {id:'dashboard',l:'Dashboard'},
    {id:'size',l:'Market Size'},
    {id:'concentration',l:'Concentration'},
    {id:'economics',l:'Deal Economics'},
    {id:'customer',l:'Ideal Customer'},
    {id:'factors',l:'Factors'}
  ];

  /* ═══ SUB-RENDERERS ═══ */

  function renderDashboard(){
    return h('div',null,
      /* ── ROW 1: Market Numbers (4 cards) ── */

  /* ── FACTORS TAB ── */
  function renderFactorsTab(){
    if(!relatedFactors.length){
      return h('div',{style:{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'40px 24px',textAlign:'center'}},
        h('div',{style:{fontSize:32,marginBottom:8}},'🔍'),
        h('div',{style:{fontSize:14,fontWeight:600,color:'#555',marginBottom:4}},'No matching factors'),
        h('div',{style:{fontSize:12,color:'#999'}},'Select provinces, industries, or sizes in the filter bar above to see which framework factors affect your target market.')
      );
    }
    /* Group by match strength */
    var strong=relatedFactors.filter(function(f){return f.strength>=2;});
    var partial=relatedFactors.filter(function(f){return f.strength===1;});
    var activeDims=[];
    if(fProvs.length)activeDims.push('province');
    if(fInds.length)activeDims.push('industry');
    if(fSizes.length)activeDims.push('size');

    function renderFactorCard(f,i){
      var it=f.item;
      var dir=DIRS.find(function(d){return d.id===it.direction;});
      var fw=fwLabel(it.framework);
      return h('div',{key:it.id,onClick:setEditId?function(){setEditId(it.id);}:null,
        style:{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',background:'#fff',borderRadius:8,cursor:setEditId?'pointer':'default',border:'1px solid #eee',transition:'border-color .15s'},
        onMouseEnter:function(e){e.currentTarget.style.borderColor='#bbb';},onMouseLeave:function(e){e.currentTarget.style.borderColor='#eee';}},
        h('div',{style:{width:8,height:8,borderRadius:'50%',background:dir?dir.c:'#999',flexShrink:0,marginTop:4}}),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontSize:12,fontWeight:600,color:'#333',marginBottom:3,lineHeight:1.3}},it.text),
          h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:3}},
            h('span',{style:{fontSize:8,fontWeight:600,color:'#888',background:'#f5f5f5',padding:'1px 6px',borderRadius:3}},fw),
            h('span',{style:{fontSize:8,fontWeight:600,color:dir?dir.c:'#888',background:(dir?dir.c:'#888')+'12',padding:'1px 6px',borderRadius:3}},dir?dir.l:'')
          ),
          /* Match reason badges */
          h('div',{style:{display:'flex',gap:3,flexWrap:'wrap'}},
            f.reasons.map(function(r,j){
              return h('span',{key:j,style:{fontSize:8,fontWeight:600,color:r.c,background:r.c+'15',padding:'1px 6px',borderRadius:3}},
                '✓ '+r.l);
            }),
            f.mismatches.length>0&&h('span',{style:{fontSize:8,fontWeight:500,color:'#bbb',padding:'1px 6px'}},
              '(no '+f.mismatches.join(', ')+' match)')
          )
        ),
        /* Impact dots */
        h('div',{style:{display:'flex',gap:2,flexShrink:0,marginTop:4}},
          Array.from({length:5},function(_,j){return h('div',{key:j,style:{width:5,height:5,borderRadius:'50%',background:j<it.impact?(dir?dir.c:'#999'):'#e5e5e5'}});}))
      );
    }

    return h('div',null,
      /* Summary bar */
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:16}},
        h('div',{style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:'14px 18px',textAlign:'center'}},
          h('div',{style:{fontSize:24,fontWeight:800,color:'#059669'}},factorOpps),
          h('div',{style:{fontSize:10,fontWeight:600,color:'#059669',textTransform:'uppercase',letterSpacing:'.03em'}},'Opportunities')
        ),
        h('div',{style:{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'14px 18px',textAlign:'center'}},
          h('div',{style:{fontSize:24,fontWeight:800,color:'#dc2626'}},factorThreats),
          h('div',{style:{fontSize:10,fontWeight:600,color:'#dc2626',textTransform:'uppercase',letterSpacing:'.03em'}},'Threats')
        ),
        h('div',{style:{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:10,padding:'14px 18px',textAlign:'center'}},
          h('div',{style:{fontSize:24,fontWeight:800,color:'#2563eb'}},strong.length),
          h('div',{style:{fontSize:10,fontWeight:600,color:'#2563eb',textTransform:'uppercase',letterSpacing:'.03em'}},'Strong Match ('+activeDims.length+' dim)')
        )
      ),

      /* How matching works */
      h('div',{style:{background:'#f8f9fa',border:'1px solid #eee',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:11,color:'#666',lineHeight:1.5}},
        'Factors match when ',h('strong',null,'any'),' of their tagged dimensions overlap with your current filters. ',
        'A factor tagged "gov + 50-99" will appear when you filter for 50-99 even if you selected a different industry — ',
        'the size match is enough. Stronger matches (multiple dimensions) are ranked first.',
        activeDims.length>0&&h('span',{style:{color:'#2563eb',fontWeight:600}},' Currently filtering: '+activeDims.join(', ')+'.')
      ),

      /* Strong matches */
      strong.length>0&&h('div',{style:{marginBottom:20}},
        h('div',{style:{fontSize:13,fontWeight:700,color:'#222',marginBottom:8,display:'flex',alignItems:'center',gap:6}},
          h('div',{style:{width:10,height:10,borderRadius:3,background:'#2563eb'}}),
          'Strong Matches ('+strong.length+')',
          h('span',{style:{fontSize:10,fontWeight:400,color:'#999',marginLeft:4}},'— overlap on '+activeDims.length+'+ dimensions')
        ),
        h('div',{style:{display:'grid',gap:6}},
          strong.map(renderFactorCard)
        )
      ),

      /* Partial matches */
      partial.length>0&&h('div',null,
        h('div',{style:{fontSize:13,fontWeight:700,color:'#222',marginBottom:8,display:'flex',alignItems:'center',gap:6}},
          h('div',{style:{width:10,height:10,borderRadius:3,background:'#94a3b8'}}),
          'Partial Matches ('+partial.length+')',
          h('span',{style:{fontSize:10,fontWeight:400,color:'#999',marginLeft:4}},'— overlap on 1 dimension')

        h('div',{style:{display:'grid',gap:6}},
          partial.map(renderFactorCard)
        )
      )
    );
  }

  /* ── FUNNEL RENDERER ── */
  function renderFunnel(height){
    var H=height||360;
    var tiers=[
      {l:'TAM — Total Addressable Market',n:tam,rev:tamRev,c:'#e5e7eb',tc:'#555',desc:'All Canadian employer businesses matching your filters'},
      {l:'SAM — Office-Based Businesses',n:sam,rev:samRev,c:'#bfdbfe',tc:'#2563eb',desc:'Businesses that occupy dedicated office space'},
      {l:'In Lease Cycle (~17%/yr)',n:lc,rev:lcRev,c:'#c4b5fd',tc:'#7c3aed',desc:'Actively looking or negotiating a lease this year'},
      {l:'SOM — Capturable (10%)',n:som,rev:somRev,c:'#bbf7d0',tc:'#059669',desc:'Realistic share Work_Space can win'}
    ];
    /* Use cube-root scaling so narrowing is dramatic but bottom tiers stay wide enough for text */
    var cbrtMax=tam>0?Math.pow(tam,1/3):1;
    var W=800,tierH=H/tiers.length,gap=4;
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',display:'block'}},
      tiers.map(function(t,i){
        var topW=tam>0?Math.max(W*.18,W*.88*(Math.pow(t.n,1/3)/cbrtMax)):W*.18;
        var nextN=i<tiers.length-1?tiers[i+1].n:t.n*.3;
        var botW=tam>0?Math.max(W*.12,W*.88*(Math.pow(nextN,1/3)/cbrtMax)):W*.12;
        var y=i*tierH+gap;var bH=tierH-gap*2;
        var x1=(W-topW)/2,x2=(W+topW)/2;
        var x3=(W+botW)/2,x4=(W-botW)/2;
        var pts=x1+','+y+' '+x2+','+y+' '+x3+','+(y+bH)+' '+x4+','+(y+bH);
        var dropPct=i>0?Math.round((1-t.n/tiers[i-1].n)*100):0;
        var isLarge=H>300;
        return h('g',{key:i},
          h('polygon',{points:pts,fill:t.c,stroke:t.tc+'22',strokeWidth:1}),
          /* Tier label */
          h('text',{x:W/2,y:y+bH*.28,textAnchor:'middle',fontSize:isLarge?13:10,fontWeight:700,fill:t.tc},t.l),
          /* Count + Revenue side by side */
          h('text',{x:W/2,y:y+bH*.55,textAnchor:'middle',fontSize:isLarge?20:14,fontWeight:800,fill:t.tc},fmt(t.n)+' businesses'),
          h('text',{x:W/2,y:y+bH*.75,textAnchor:'middle',fontSize:isLarge?13:10,fontWeight:600,fill:t.tc+'99'},fmtD(t.rev)+' revenue potential'),
          /* Drop-off badge */
          i>0&&h('g',null,
            h('rect',{x:x1-52,y:y+bH*.35,width:42,height:18,rx:9,fill:t.tc+'15'}),
            h('text',{x:x1-31,y:y+bH*.35+13,textAnchor:'middle',fontSize:isLarge?10:8,fontWeight:700,fill:t.tc},'-'+dropPct+'%')
          )
        );
      })
    );
  }

  /* ── MARKET SIZE TAB ── */
  function renderSizeTab(){
    return h('div',null,
      h('div',{style:{fontSize:16,fontWeight:700,color:'#222',marginBottom:4}},'How big is my market?'),
      h('div',{style:{fontSize:12,color:'#999',marginBottom:6}},'Total addressable → office-based → in active lease cycle → capturable share. Count and revenue at each tier.'),
      h('div',{style:{fontSize:10,color:'#bbb',marginBottom:20,fontStyle:'italic'}},'Sources: Statistics Canada, Canadian Employer Businesses (Dec 2023); Survey on Financing & Growth of SMEs (2022). Lease cycle estimate: BOMA Canada; capture rate: Work_Space internal target.'),
      h('div',{style:{background:'#fff',border:'1px solid #eee',borderRadius:12,padding:'28px 32px',marginBottom:16}},
        renderFunnel(420)
      ),
      /* Waterfall: revenue breakdown TAM → SOM */
      h('div',{style:{background:'#fff',border:'1px solid #eee',borderRadius:12,padding:'24px 28px'}},
        h('div',{style:{fontSize:14,fontWeight:700,color:'#222',marginBottom:4}},'Revenue waterfall — where the opportunity narrows'),
        h('div',{style:{fontSize:11,color:'#999',marginBottom:16}},'Starting from total addressable revenue, each red bar shows what drops off. The green bar is what remains.'),
        (function(){
          /* Proper waterfall: total → drops → final total */
          var drop1=tamRev-samRev, drop2=samRev-lcRev, drop3=lcRev-somRev;
          var steps=[
            {l:'TAM Revenue',type:'total',val:tamRev,top:0,bot:tamRev,c:'#6b7280'},
            {l:'Non-office',type:'drop',val:drop1,top:tamRev,bot:samRev,c:'#ef4444',pct:tamRev>0?Math.round(drop1/tamRev*100):0},
            {l:'Not in lease cycle',type:'drop',val:drop2,top:samRev,bot:lcRev,c:'#ef4444',pct:tamRev>0?Math.round(drop2/tamRev*100):0},
            {l:'Competition',type:'drop',val:drop3,top:lcRev,bot:somRev,c:'#ef4444',pct:tamRev>0?Math.round(drop3/tamRev*100):0},
            {l:'SOM Revenue',type:'total',val:somRev,top:0,bot:somRev,c:'#059669'}
          ];
          var maxV=tamRev||1;
          var W=800,H=300,PL=20,PR=20,PB=50,PT=30;
          var cW=W-PL-PR,cH=H-PT-PB;
          var bW=cW/steps.length*.55;
          var gap=(cW-bW*steps.length)/(steps.length+1);
          function yPos(v){return PT+cH*(1-v/maxV);}
          return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%'}},
            /* Horizontal grid lines */
            [0,.25,.5,.75,1].map(function(f){
              var y=PT+cH*(1-f);
              return h('g',{key:'g'+f},
                h('line',{x1:PL,x2:W-PR,y1:y,y2:y,stroke:'#f5f5f5',strokeWidth:1}),
                f>0&&h('text',{x:PL-2,y:y+3,textAnchor:'end',fontSize:8,fill:'#ccc'},fmtD(Math.round(maxV*f)))
              );
            }),
            /* Baseline */
            h('line',{x1:PL,x2:W-PR,y1:yPos(0),y2:yPos(0),stroke:'#e5e5e5',strokeWidth:1}),
            /* Bars + connectors */
            steps.map(function(s,i){
              var x=PL+gap+(gap+bW)*i;
              var y1=yPos(s.top);
              var y2=yPos(s.bot);
              var barTop=Math.min(y1,y2);
              var barH=Math.max(Math.abs(y2-y1),3);
              /* Connector line to next bar */
              var connector=null;
              if(i<steps.length-1){
                var nx=PL+gap+(gap+bW)*(i+1);
                var connectY=s.type==='drop'?yPos(s.bot):yPos(s.bot);
                connector=h('line',{x1:x+bW,x2:nx,y1:connectY,y2:connectY,stroke:'#ddd',strokeWidth:1,strokeDasharray:'4,3'});
              }
              return h('g',{key:i},
                connector,
                h('rect',{x:x,y:barTop,width:bW,height:barH,fill:s.c,rx:4,opacity:s.type==='drop'?.75:1}),
                /* Value label above bar */
                h('text',{x:x+bW/2,y:barTop-8,textAnchor:'middle',fontSize:11,fontWeight:700,fill:s.c},
                  s.type==='drop'?'-'+fmtD(s.val):fmtD(s.val)),
                /* Percentage for drops */
                s.pct>0&&h('text',{x:x+bW/2,y:barTop-22,textAnchor:'middle',fontSize:9,fontWeight:600,fill:'#999'},
                  s.pct+'% of TAM'),
                /* X-axis label */
                h('text',{x:x+bW/2,y:H-PB+16,textAnchor:'middle',fontSize:10,fontWeight:600,fill:'#666'},s.l),
                /* Sub-label showing running total for drops */
                s.type==='drop'&&h('text',{x:x+bW/2,y:H-PB+28,textAnchor:'middle',fontSize:8,fontWeight:500,fill:'#bbb'},
                  '→ '+fmtD(s.bot)+' left')
              );
            })
          );
        })()
      )
    );
  }

  /* ── BUBBLE CHART RENDERER ── */
  function renderBubble(height){
    var H=height||360;
    var bd=byInd.filter(function(x){return x.count>0;});
    if(!bd.length)return h('div',{style:{padding:40,textAlign:'center',color:'#ccc',fontSize:13}},'No data for current filters');
    var maxC=Math.max.apply(null,bd.map(function(x){return x.count;}).concat([1]));
    var maxD=Math.max.apply(null,bd.map(function(x){return x.deal;}).concat([1]));
    var maxRev=Math.max.apply(null,bd.map(function(x){return x.count*x.deal;}).concat([1]));
    var W=800,PL=56,PR=20,PT=16,PB=32;
    var cW=W-PL-PR,cH=H-PT-PB;
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%'}},
      [.25,.5,.75,1].map(function(f){
        var y=PT+cH*(1-f);
        return h('g',{key:'gy'+f},
          h('line',{x1:PL,x2:W-PR,y1:y,y2:y,stroke:'#f3f3f3',strokeWidth:1}),
          h('text',{x:PL-4,y:y+3,textAnchor:'end',fontSize:9,fill:'#bbb'},fmtD(Math.round(maxD*f)))
        );
      }),
      h('text',{x:W/2,y:H-2,textAnchor:'middle',fontSize:9,fill:'#bbb'},'← fewer businesses          more businesses →'),
      h('text',{x:8,y:H/2,textAnchor:'middle',fontSize:9,fill:'#bbb',transform:'rotate(-90,8,'+H/2+')'},'Deal Size →'),
      bd.map(function(d){
        var rev=d.count*d.deal;
        var x=PL+cW*(d.count/maxC*.9)+cW*.05;
        var y=PT+cH-cH*(d.deal/maxD*.85)-cH*.05;
        var r=Math.max(H>300?12:8,Math.sqrt(rev/maxRev)*(H>300?48:30));
        return h('g',{key:d.id,style:{cursor:'pointer'},onClick:function(){tog(fInds,setFInds,d.id);}},
          h('circle',{cx:x,cy:y,r:r,fill:d.c+'20',stroke:d.c,strokeWidth:2}),
          h('text',{x:x,y:y-r-4,textAnchor:'middle',fontSize:H>300?12:9,fontWeight:700,fill:d.c},d.l),
          h('text',{x:x,y:y+4,textAnchor:'middle',fontSize:H>300?11:8,fontWeight:600,fill:d.c},fmtD(rev))
        );
      })
    );
  }

        h('div',{style:{fontSize:11,color:'#999',marginBottom:14}},'Rectangle size = business count. Quickly see which industry × province combinations dominate.'),
        (function(){
          var items=treemapData.slice(0,30);
          var total=items.reduce(function(s,x){return s+x.count;},0);
          if(!total)return h('div',{style:{padding:20,color:'#ccc'}},'No data');
          /* Simple squarified-ish treemap: just flow into rows */
          var rows=[],row=[],rowW=0;
          items.forEach(function(item){
            var pct=item.count/total;
            row.push({item:item,pct:pct});rowW+=pct;
            if(rowW>.3||row.length>=5){rows.push(row);row=[];rowW=0;}
          });
          if(row.length)rows.push(row);
          var totalH=320;
          return h('div',{style:{width:'100%',height:totalH,display:'flex',flexDirection:'column',gap:2}},
            rows.map(function(r,ri){

      )

function CompactRow(props){

  var hasSizeTags=(tags.sizes||[]).length>0;

  var hasIndTags=(tags.inds||[]).length>0;
  var hasConcernTags=(tags.concerns||[]).length>0;

    hasAnyTag&&h('div',{style:{display:'flex',gap:2,flexShrink:0},title:(hasDimTags?'Market ':'')+(hasConcernTags?'Concerns ':'')+(hasPlan?'Plan':'')},

      hasConcernTags&&h('div',{style:{width:6,height:6,borderRadius:'50%',background:'#7c3aed'}}),
      hasPlan&&h('div',{style:{width:6,height:6,borderRadius:'50%',background:'#ea580c'}})

    h('span',{style:{fontSize:8,fontWeight:600,color:typ?typ.c:'#999',background:(typ?typ.c:'#999')+'12',padding:'1px 5px',borderRadius:3,flexShrink:0}},typ?typ.l:''),
    h('span',{style:{fontSize:8,fontWeight:600,color:dir?dir.c:'#999',background:dir?dir.bg:'#f5f5f5',padding:'1px 5px',borderRadius:3,flexShrink:0}},dir?dir.l:''),

/* ═══════════════════════════════════════════════
   COMPETITION PAGE — Competitive Landscape (v2)
   ═══════════════════════════════════════════════ */
function CompetitionPage(props){
  var competitors=props.competitors,setCompetitors=props.setCompetitors;
  var compScores=props.compScores,setCompScores=props.setCompScores;
  var profiles=props.profiles,segments=props.segments,snap=props.snap;
  var _activeProf=useState(0),activeProf=_activeProf[0],setActiveProf=_activeProf[1];
  var _sortBy=useState('selected'),sortBy=_sortBy[0],setSortBy=_sortBy[1];
  var _filterType=useState('all'),filterType=_filterType[0],setFilterType=_filterType[1];
  var _editComp=useState(null),editComp=_editComp[0],setEditComp=_editComp[1];
  var _searchQ=useState(''),searchQ=_searchQ[0],setSearchQ=_searchQ[1];
  var _activeSeg=useState(null),activeSeg=_activeSeg[0],setActiveSeg=_activeSeg[1];

  var prof=profiles[activeProf]||profiles[0];
  var criteria=(prof?prof.criteria:[])||[];
  var critKeys=Object.keys(CRIT_KEY_MAP);

  function critToKey(name){for(var k in CRIT_KEY_MAP){if(CRIT_KEY_MAP[k]===name)return k;}return null;}

  /* Get segment-adjusted criteria for scoring */
  var segWeights=useMemo(function(){
    if(!activeSeg)return null;
    var seg=segments.find(function(s){return s.id===activeSeg;});
    return seg?getSegWeights(seg.name):null;
  },[activeSeg,segments]);

  var effectiveCriteria=useMemo(function(){
    if(!segWeights)return criteria.filter(function(c){return c.weight>0;});
    return criteria.map(function(c){
      var ck=CRIT_NAME_TO_KEY[c.name];
      var sw=ck&&segWeights[ck]!==undefined?segWeights[ck]:c.weight;
      return Object.assign({},c,{weight:sw});
    }).filter(function(c){return c.weight>0;});
  },[criteria,segWeights]);

  function getScores(comp){
    if(compScores[comp.id])return compScores[comp.id];
    return getCompScores(comp.id,comp.type);
  }

  function calcValue(comp){
    var sc=getScores(comp);
    var totalW=effectiveCriteria.reduce(function(s,c){return s+c.weight;},0);
    if(!totalW)return 0;
    return effectiveCriteria.reduce(function(s,c){
      var key=critToKey(c.name);
      var score=key&&sc[key]!=null?sc[key]:5;
      return s+(score*(c.weight/totalW));
    },0);
  }

  var allCompsRanked=useMemo(function(){
    return COMP_DB.map(function(c){
      var tp=COMP_TYPES.find(function(t){return t.t===c.type;});
      var val=calcValue(c);
      var sc=getScores(c);
      var strengths=critKeys.map(function(k){return{key:k,name:CRIT_KEY_MAP[k],val:sc[k]||5};})
        .sort(function(a,b){return b.val-a.val;}).slice(0,3);
      var weaknesses=critKeys.map(function(k){return{key:k,name:CRIT_KEY_MAP[k],val:sc[k]||5};})
        .sort(function(a,b){return a.val-b.val;}).slice(0,3);
      return{comp:c,value:val,cost:c.cost,scores:sc,type:tp,strengths:strengths,weaknesses:weaknesses,selected:competitors.includes(c.id)};
    });
  },[competitors,effectiveCriteria,compScores,activeSeg]);

  var bankComps=useMemo(function(){
    var list=allCompsRanked;
    if(filterType!=='all')list=list.filter(function(r){return r.comp.type===filterType;});
    if(searchQ){var q=searchQ.toLowerCase();list=list.filter(function(r){return r.comp.name.toLowerCase().indexOf(q)>-1;});}
    if(sortBy==='value')list=list.slice().sort(function(a,b){return b.value-a.value;});
    else if(sortBy==='cost')list=list.slice().sort(function(a,b){return a.cost-b.cost;});
    else if(sortBy==='name')list=list.slice().sort(function(a,b){return a.comp.name.localeCompare(b.comp.name);});
    else if(sortBy==='selected')list=list.slice().sort(function(a,b){return(b.selected?1:0)-(a.selected?1:0)||b.value-a.value;});
    return list;
  },[allCompsRanked,filterType,sortBy,searchQ]);

  function addComp(cid){if(!competitors.includes(cid)){snap();setCompetitors(function(p){return p.concat([cid]);});}}
  function removeComp(cid){snap();setCompetitors(function(p){return p.filter(function(x){return x!==cid;});});}
  function toggleComp(cid){if(competitors.includes(cid)){removeComp(cid);}else{addComp(cid);}}
  function updateScore(compId,key,val){
    snap();
    setCompScores(function(prev){
      var cur=prev[compId]||getCompScores(compId,(COMP_DB.find(function(c){return c.id===compId;})||{}).type);
      var nxt=Object.assign({},cur);nxt[key]=val;
      var out=Object.assign({},prev);out[compId]=nxt;return out;
    });
  }

  var selCount=competitors.filter(function(c){return c!=='workspace';}).length;

  /* Editing popup */
  var editData=useMemo(function(){
    if(!editComp)return null;
    var c=COMP_DB.find(function(x){return x.id===editComp;});
    if(!c)return null;
    var tp=COMP_TYPES.find(function(t){return t.t===c.type;});
    var sc=getScores(c);
    var val=calcValue(c);
    return{comp:c,type:tp,scores:sc,value:val};
  },[editComp,compScores,effectiveCriteria]);

  return h('div',null,
    h('div',{style:{marginBottom:16}},
      h('div',{style:{fontSize:20,fontWeight:800,color:'#111',letterSpacing:'-0.02em'}},'Competition'),
      h('div',{style:{fontSize:12,color:'#888',marginTop:2}},'Who are you competing against? Filter by segment to see how scores shift based on what that buyer values.')
    ),

    /* Offering + Segment selectors */
    h('div',{style:{display:'flex',alignItems:'center',gap:16,marginBottom:12,flexWrap:'wrap'}},
    profiles.length>1&&h('div',{style:{display:'flex',gap:4}},
      profiles.map(function(p,i){
        var active=i===activeProf;
        var stL=p.stage==='s1'?'S1':p.stage==='s2'?'S2':p.stage==='s3'?'S3':'';
        return h('button',{key:p.id,onClick:function(){setActiveProf(i);},
          style:{padding:'5px 12px',borderRadius:6,fontSize:11,fontWeight:active?700:500,
            border:active?'none':'1px solid #e5e5e5',background:active?'#111':'#fff',color:active?'#fff':'#666',cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
          stL&&h('span',{style:{fontSize:8,fontWeight:700,background:active?'rgba(255,255,255,.2)':'#f0f0f0',padding:'1px 4px',borderRadius:3,color:active?'#fff':'#999'}},stL),
          p.name);
      })
    ),
    /* Segment filter */
    segments.length>0&&h('div',{style:{display:'flex',alignItems:'center',gap:6,marginLeft:'auto'}},
      h('span',{style:{fontSize:9,fontWeight:700,color:'#999',textTransform:'uppercase',letterSpacing:'.04em'}},'Segment'),
      h('button',{onClick:function(){setActiveSeg(null);},
        style:{padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,
          border:!activeSeg?'none':'1px solid #e5e5e5',background:!activeSeg?'#2563eb':'#fff',
          color:!activeSeg?'#fff':'#666',cursor:'pointer'}},'All'),
      segments.map(function(seg){
        var active=activeSeg===seg.id;
        return h('button',{key:seg.id,onClick:function(){setActiveSeg(active?null:seg.id);},
          style:{padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,
            border:active?'none':'1px solid #e5e5e5',background:active?(seg.color||'#2563eb'):'#fff',
            color:active?'#fff':'#666',cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
          h('div',{style:{width:5,height:5,borderRadius:'50%',background:active?'#fff':seg.color||'#999'}}),
          seg.name);
      })
    )
    ),

    /* Segment hint */
    activeSeg&&h('div',{style:{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:8,padding:'8px 14px',marginBottom:12,fontSize:11,color:'#2563eb',fontWeight:500}},
      'Scores are weighted by what this segment values most. Rankings may shift compared to "All".'),

    /* Controls bar */
    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}},
      h('input',{type:'text',placeholder:'Search competitors...',value:searchQ,onChange:function(e){setSearchQ(e.target.value);},
        style:{padding:'6px 12px',borderRadius:8,border:'1px solid #e5e5e5',fontSize:11,width:180,outline:'none'}}),
      h('select',{value:sortBy,onChange:function(e){setSortBy(e.target.value);},
        style:{padding:'6px 8px',borderRadius:6,border:'1px solid #e5e5e5',fontSize:10,fontWeight:600,color:'#555',background:'#fff'}},
        h('option',{value:'selected'},'Selected first'),
        h('option',{value:'value'},'By score'),
        h('option',{value:'cost'},'By cost'),
        h('option',{value:'name'},'By name')
      ),
      h('select',{value:filterType,onChange:function(e){setFilterType(e.target.value);},
        style:{padding:'6px 8px',borderRadius:6,border:'1px solid #e5e5e5',fontSize:10,fontWeight:600,color:'#555',background:'#fff'}},
        h('option',{value:'all'},'All Types'),
        COMP_TYPES.map(function(tp){return h('option',{key:tp.t,value:tp.t},tp.l);})
      ),
      h('div',{style:{flex:1}}),
      h('span',{style:{fontSize:11,color:'#888'}},selCount+' competitors selected'),
      h('button',{onClick:function(){snap();setCompetitors(COMP_DB.map(function(c){return c.id;}));},
        style:{padding:'5px 10px',borderRadius:6,border:'1px solid #e5e5e5',fontSize:10,fontWeight:600,color:'#555',background:'#fff',cursor:'pointer'}},'Select All'),
      h('button',{onClick:function(){snap();setCompetitors(['workspace']);},
        style:{padding:'5px 10px',borderRadius:6,border:'1px solid #e5e5e5',fontSize:10,fontWeight:600,color:'#555',background:'#fff',cursor:'pointer'}},'Clear')
    ),

    /* Type legend */
    h('div',{style:{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}},
      COMP_TYPES.map(function(tp){
        var cnt=COMP_DB.filter(function(c){return c.type===tp.t;}).length;
        var selCnt=COMP_DB.filter(function(c){return c.type===tp.t&&competitors.includes(c.id);}).length;
        return h('div',{key:tp.t,onClick:function(){setFilterType(filterType===tp.t?'all':tp.t);},

            background:filterType===tp.t?tp.c+'15':'#f8f9fa',border:'1px solid '+(filterType===tp.t?tp.c+'40':'transparent'),transition:'all .15s'}},

          h('span',{style:{fontSize:9,color:'#bbb',marginLeft:2}},selCnt+'/'+cnt)

    ),

    /* Competitor card grid */
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}},
      bankComps.map(function(r){

          /* Top row: checkbox + type + name */

                display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginTop:1}},
              sel&&h('span',{style:{color:'#fff',fontSize:12,fontWeight:800}},'✓')
            ),
            isMe&&h('div',{style:{width:20,height:20,borderRadius:5,background:'#059669',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}},
              h('span',{style:{color:'#fff',fontSize:10,fontWeight:800}},'★')
            ),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:2}},
                h('span',{style:{fontSize:8,fontWeight:700,color:col,background:col+'15',padding:'2px 6px',borderRadius:3,textTransform:'uppercase'}},tp?tp.l:''),
                isMe&&h('span',{style:{fontSize:8,fontWeight:700,color:'#059669',background:'#f0fdf4',padding:'2px 6px',borderRadius:3}},'YOU')

                h('div',{style:{width:40,height:5,background:'#f0f0f0',borderRadius:3,overflow:'hidden'}},

function SelfAssessPage(props){
  var selfScores=props.selfScores,setSelfScores=props.setSelfScores;
  var profiles=props.profiles,competitors=props.competitors,compScores=props.compScores,snap=props.snap;
  var _activeProf=useState(0),activeProf=_activeProf[0],setActiveProf=_activeProf[1];

  var prof=profiles[activeProf]||profiles[0];
  var criteria=prof?prof.criteria.filter(function(c){return c.weight>0;}):[];
  var critKeys=Object.keys(CRIT_KEY_MAP);

  function critToKey(name){for(var k in CRIT_KEY_MAP){if(CRIT_KEY_MAP[k]===name)return k;}return null;}
  function updateScore(key,val){snap();var next=Object.assign({},selfScores);next[key]=val;setSelfScores(next);}

  /* Competitor averages */
  var compAvgs=useMemo(function(){
    var selComps=competitors.filter(function(cid){return cid!=='workspace';}).map(function(cid){
      return COMP_DB.find(function(c){return c.id===cid;});
    }).filter(Boolean);
    if(!selComps.length)return{};
    var avgs={};
    critKeys.forEach(function(k){
      var sum=selComps.reduce(function(s,comp){
        var sc=compScores[comp.id]||getCompScores(comp.id,comp.type);
        return s+(sc[k]||5);
      },0);
      avgs[k]=sum/selComps.length;
    });
    return avgs;
  },[competitors,compScores]);

  /* Top competitor per criterion */
  var topPerCrit=useMemo(function(){
    var selComps=competitors.filter(function(cid){return cid!=='workspace';}).map(function(cid){
      return COMP_DB.find(function(c){return c.id===cid;});
    }).filter(Boolean);
    var tops={};
    critKeys.forEach(function(k){
      var best=null,bestScore=0;
      selComps.forEach(function(comp){
        var sc=compScores[comp.id]||getCompScores(comp.id,comp.type);
        if((sc[k]||5)>bestScore){bestScore=sc[k]||5;best=comp.name;}
      });
      tops[k]={name:best||'—',score:bestScore};
    });
    return tops;
  },[competitors,compScores]);

  var totalW=criteria.reduce(function(s,c){return s+c.weight;},0);
  var myWeighted=totalW?criteria.reduce(function(s,c){var k=critToKey(c.name);return s+((selfScores[k]||5)*(c.weight/totalW));},0):0;
  var compWeighted=totalW?criteria.reduce(function(s,c){var k=critToKey(c.name);return s+((compAvgs[k]||5)*(c.weight/totalW));},0):0;
  var gap=myWeighted-compWeighted;

  /* Categorize criteria into strengths, competitive, weaknesses */

    var items=critKeys.map(function(k){

      var critMatch=criteria.find(function(c){return critToKey(c.name)===k;});
      var weight=critMatch?critMatch.weight:0;
      var diff=myVal-avg;
      var impact=weight>0?diff*(weight/Math.max(totalW,1)):0;
      return{key:k,name:CRIT_KEY_MAP[k],myVal:myVal,avg:avg,top:top,weight:weight,diff:diff,impact:impact};
    });
    var strengths=items.filter(function(i){return i.diff>=2;}).sort(function(a,b){return b.impact-a.impact;});
    var competitive=items.filter(function(i){return i.diff>-2&&i.diff<2;}).sort(function(a,b){return b.weight-a.weight;});
    var weaknesses=items.filter(function(i){return i.diff<=-2;}).sort(function(a,b){return a.impact-b.impact;});
    var investPriority=items.filter(function(i){return i.weight>0&&i.diff<0;}).sort(function(a,b){return a.impact-b.impact;}).slice(0,3);
    return{strengths:strengths,competitive:competitive,weaknesses:weaknesses,invest:investPriority,all:items};
  },[selfScores,compAvgs,topPerCrit,criteria]);

  /* Radar */

function ValueMapPage(props){

  var _sizeMode=useState('share'),sizeMode=_sizeMode[0],setSizeMode=_sizeMode[1];
  var _showLabels=useState(true),showLabels=_showLabels[0],setShowLabels=_showLabels[1];
  var _highlightType=useState('all'),highlightType=_highlightType[0],setHighlightType=_highlightType[1];
  var _layer=useState('position'),layer=_layer[0],setLayer=_layer[1];

  var prof=profiles[activeProf]||profiles[0];
  var criteria=prof?prof.criteria.filter(function(c){return c.weight>0;}):[];
  var critKeys=Object.keys(CRIT_KEY_MAP);
  var totalW=criteria.reduce(function(s,c){return s+c.weight;},0);

  function critToKey(name){for(var k in CRIT_KEY_MAP){if(CRIT_KEY_MAP[k]===name)return k;}return null;}

            h('div',null,
              h('div',{style:{fontSize:10,color:'#aaa'}},'After Top 3'),
              h('div',{style:{fontSize:32,fontWeight:800,color:'#fbbf24'}},
                myData?(myData.valueScore+roiData.slice(0,3).reduce(function(s,r){return s+r.weightedImpact;},0)).toFixed(1):'—')

            h('div',null,

            ),
            h('div',{style:{flex:1}}),
            h('div',{style:{textAlign:'right'}},

              h('div',{style:{fontSize:32,fontWeight:800,color:'#4ade80'}},'+'+roiData.reduce(function(s,r){return s+r.weightedImpact;},0).toFixed(1))

        ),

        /* Action cards — one per gap, with specific actions */
        roiData.slice(0,Math.min(roiData.length,5)).map(function(r,i){
          var col=i===0?'#059669':(i===1?'#2563eb':(i===2?'#7c3aed':'#ea580c'));

          var borderCol=i===0?'#bbf7d0':(i===1?'#bfdbfe':(i===2?'#ddd6fe':'#fed7aa'));
          var moveInfo=MOVE_ACTIONS[r.key]||{actions:['Invest in improving this capability','Benchmark against top competitors','Set measurable improvement targets','Track progress quarterly'],kpi:'Custom KPI',benchmark:'Set internal target'};
          return h('div',{key:r.key,style:{background:'#fff',border:'1px solid #eee',borderRadius:14,marginBottom:12,overflow:'hidden'}},
            /* Header row */

              /* Rank + name */
              h('div',{style:{background:bgCol,borderRight:'1px solid '+borderCol,padding:'16px 20px',display:'flex',alignItems:'center',gap:12,minWidth:240}},
                h('div',{style:{width:32,height:32,borderRadius:8,background:col,display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:16,fontWeight:800,color:'#fff',flexShrink:0}},'#'+(i+1)),
                h('div',null,
                  h('div',{style:{fontSize:14,fontWeight:700,color:'#222'}},r.name),

                )

              /* Score bar */
              h('div',{style:{flex:1,padding:'12px 20px',display:'flex',alignItems:'center',gap:20}},

}


/* ═══════════════════════════════════════════════
   FORECASTING PAGE — 3-Year Market Share Planning
   ═══════════════════════════════════════════════ */
function ForecastingPage(props){
  var segments=props.segments;
  var _fp=useState([]),fProvs=_fp[0],setFProvs=_fp[1];
  var _fi=useState([]),fInds=_fi[0],setFInds=_fi[1];
  var _fs=useState([]),fSizes=_fs[0],setFSizes=_fs[1];
  var _cr=useState(10),captureRate=_cr[0],setCaptureRate=_cr[1];
  var _gr=useState(5),growthRate=_gr[0],setGrowthRate=_gr[1];

  function tog(arr,set,v){set(function(p){return p.includes(v)?p.filter(function(x){return x!==v;}):p.concat([v]);});}

  function Pill(pp){
    return h('button',{onClick:pp.onClick,
      style:{padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,
        border:pp.active?'none':'1px solid #e5e5e5',
        background:pp.active?(pp.color||'#111'):'#fff',
        color:pp.active?'#fff':(pp.color||'#666'),cursor:'pointer',transition:'all .15s'}},pp.label);
  }

  /* ── Filtered data ── */
  var filtered=useMemo(function(){
    return BIZ_DATA.filter(function(r){
      if(fProvs.length&&!fProvs.includes(r.prov))return false;
      if(fInds.length&&!fInds.includes(r.ind))return false;
      if(fSizes.length&&!fSizes.includes(r.size))return false;
      return true;
    });
  },[fProvs,fInds,fSizes]);

  var totalBiz=filtered.reduce(function(s,r){return s+r.count;},0);
  var officeBiz=filtered.reduce(function(s,r){return s+r.offCount;},0);

  /* Size-weighted average deal */
  var samDeal=useMemo(function(){
    var sw=0,sc=0;
    filtered.forEach(function(r){
      var ind=INDUSTRIES.find(function(x){return x.id===r.ind;});
      var sz=BIZ_SIZES.find(function(x){return x.id===r.size;});
      if(!ind)return;var dealVal=ind.deal*(sz?sz.deal:1);
      sw+=r.offCount*dealVal;sc+=r.offCount;
    });return sc>0?Math.round(sw/sc):185000;
  },[filtered]);

  /* ── 3-Year funnel math ── */
  var sam=officeBiz;
  /* ~17%/yr enter lease cycle. Over 3 years, ~51% of SAM will enter at least once.
     More precisely: 1 - (1 - 0.17)^3 = 0.4278, but with some overlap/re-entry ~51% is realistic */
  var leasePool3yr=Math.round(sam*0.4278);
  var capturable3yr=Math.round(leasePool3yr*(captureRate/100));
  var samRev=sam*samDeal;
  var leasePoolRev=leasePool3yr*samDeal;
  var capturableRev=capturable3yr*samDeal;

  /* ── Year-by-year breakdown with growth ── */
  var yearData=useMemo(function(){
    var years=[];
    for(var y=0;y<3;y++){
      var growthMul=Math.pow(1+(growthRate/100),y);
      var yrSam=Math.round(sam*growthMul);
      var yrLease=Math.round(yrSam*0.17);
      var yrCapture=Math.round(yrLease*(captureRate/100));
      var yrDeal=Math.round(samDeal*Math.pow(1.02,y)); /* 2% annual deal growth */
      var yrRev=yrCapture*yrDeal;
      years.push({year:y+1,label:'Year '+(y+1),sam:yrSam,lease:yrLease,capture:yrCapture,deal:yrDeal,rev:yrRev});
    }
    return years;
  },[sam,samDeal,captureRate,growthRate]);

  var totalRev3yr=yearData.reduce(function(s,y){return s+y.rev;},0);
  var totalCapture3yr=yearData.reduce(function(s,y){return s+y.capture;},0);
  var totalLease3yr=yearData.reduce(function(s,y){return s+y.lease;},0);

  /* ── Industry breakdown for top segments ── */
  var byInd=useMemo(function(){
    var m={};filtered.forEach(function(r){
      if(!m[r.ind])m[r.ind]={count:0,offCount:0,wtdDeal:0};
      var sz=BIZ_SIZES.find(function(x){return x.id===r.size;});
      var ind=INDUSTRIES.find(function(x){return x.id===r.ind;});
      var dealVal=ind?ind.deal*(sz?sz.deal:1):0;
      m[r.ind].offCount+=r.offCount;
      m[r.ind].wtdDeal+=r.offCount*dealVal;
    });
    return INDUSTRIES.map(function(ind){
      var d=m[ind.id]||{offCount:0,wtdDeal:0};
      var avgD=d.offCount>0?Math.round(d.wtdDeal/d.offCount):ind.deal;
      return{id:ind.id,l:ind.s,full:ind.l,c:ind.c,count:d.offCount,deal:avgD};
    }).filter(function(x){return x.count>0;}).sort(function(a,b){return b.count-a.count;});
  },[filtered]);

  /* ── 3-Year Funnel Renderer ── */
  function renderForecastFunnel(){
    var H=380;
    var tiers=[
      {l:'SAM — Office-Based Businesses',n:sam,rev:samRev,c:'#bfdbfe',tc:'#2563eb',desc:'All office-based businesses in your filtered market'},
      {l:'3-Year Lease Cycle Pool (~43%)',n:leasePool3yr,rev:leasePoolRev,c:'#ddd6fe',tc:'#7c3aed',desc:'Businesses entering a lease decision within 3 years'},
      {l:'Capturable Over 3 Years ('+captureRate+'%)',n:capturable3yr,rev:capturableRev,c:'#bbf7d0',tc:'#059669',desc:'Realistic share Work_Space can win over the planning horizon'}
    ];
    var cbrtMax=sam>0?Math.pow(sam,1/3):1;
    var W=800,tierH=H/tiers.length,gap=4;
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',display:'block'}},
      tiers.map(function(t,i){
        var topW=sam>0?Math.max(W*.18,W*.88*(Math.pow(t.n,1/3)/cbrtMax)):W*.18;
        var nextN=i<tiers.length-1?tiers[i+1].n:t.n*.3;
        var botW=sam>0?Math.max(W*.12,W*.88*(Math.pow(nextN,1/3)/cbrtMax)):W*.12;
        var y=i*tierH+gap;var bH=tierH-gap*2;
        var x1=(W-topW)/2,x2=(W+topW)/2;
        var x3=(W+botW)/2,x4=(W-botW)/2;
        var pts=x1+','+y+' '+x2+','+y+' '+x3+','+(y+bH)+' '+x4+','+(y+bH);
        var dropPct=i>0?Math.round((1-t.n/tiers[i-1].n)*100):0;
        return h('g',{key:i},
          h('polygon',{points:pts,fill:t.c,stroke:t.tc+'22',strokeWidth:1}),
          h('text',{x:W/2,y:y+bH*.25,textAnchor:'middle',fontSize:13,fontWeight:700,fill:t.tc},t.l),
          h('text',{x:W/2,y:y+bH*.50,textAnchor:'middle',fontSize:22,fontWeight:800,fill:t.tc},fmt(t.n)+' businesses'),
          h('text',{x:W/2,y:y+bH*.70,textAnchor:'middle',fontSize:13,fontWeight:600,fill:t.tc+'99'},fmtD(t.rev)+' revenue potential'),
          h('text',{x:W/2,y:y+bH*.88,textAnchor:'middle',fontSize:10,fontWeight:500,fill:t.tc+'77',fontStyle:'italic'},t.desc),
          i>0&&h('g',null,
            h('rect',{x:x1-52,y:y+bH*.35,width:42,height:18,rx:9,fill:t.tc+'15'}),
            h('text',{x:x1-31,y:y+bH*.35+13,textAnchor:'middle',fontSize:10,fontWeight:700,fill:t.tc},'-'+dropPct+'%')
          )
        );
      })
    );
  }

  /* ── Year-by-Year Bar Chart ── */
  function renderYearBars(){
    var W=800,H=280,PL=60,PR=20,PB=40,PT=30;
    var cW=W-PL-PR,cH=H-PT-PB;
    var maxRev=Math.max.apply(null,yearData.map(function(y){return y.rev;}))||1;
    /* Round up max to nearest nice number */
    var niceMax=maxRev;
    if(niceMax>1e6)niceMax=Math.ceil(niceMax/1e6)*1e6;
    else if(niceMax>1e3)niceMax=Math.ceil(niceMax/1e3)*1e3;
    var bW=cW/3*.45;
    var gap=(cW-bW*3)/4;
    function yPos(v){return PT+cH*(1-v/niceMax);}
    var colors=['#93c5fd','#818cf8','#6ee7b7'];
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',display:'block'}},
      /* Grid lines */
      [0,.25,.5,.75,1].map(function(f){
        var y=PT+cH*(1-f);
        return h('g',{key:'g'+f},
          h('line',{x1:PL,x2:W-PR,y1:y,y2:y,stroke:'#f0f0f0',strokeWidth:1}),
          h('text',{x:PL-6,y:y+3,textAnchor:'end',fontSize:9,fill:'#bbb'},fmtD(Math.round(niceMax*f)))
        );
      }),
      h('line',{x1:PL,x2:W-PR,y1:yPos(0),y2:yPos(0),stroke:'#e5e5e5',strokeWidth:1}),
      /* Bars */
      yearData.map(function(yr,i){
        var x=PL+gap+(gap+bW)*i;
        var barH=Math.max((yr.rev/niceMax)*cH,3);
        var barY=PT+cH-barH;
        return h('g',{key:i},
          h('rect',{x:x,y:barY,width:bW,height:barH,fill:colors[i],rx:6}),
          h('text',{x:x+bW/2,y:barY-18,textAnchor:'middle',fontSize:14,fontWeight:800,fill:'#333'},fmtD(yr.rev)),
          h('text',{x:x+bW/2,y:barY-5,textAnchor:'middle',fontSize:9,fontWeight:600,fill:'#999'},fmt(yr.capture)+' deals'),
          h('text',{x:x+bW/2,y:H-PB+16,textAnchor:'middle',fontSize:12,fontWeight:700,fill:'#555'},yr.label),
          h('text',{x:x+bW/2,y:H-PB+28,textAnchor:'middle',fontSize:9,fontWeight:500,fill:'#aaa'},fmtD(yr.deal)+'/deal')
        );
      })
    );
  }

  /* ── Cumulative Area Chart ── */
  function renderCumulativeChart(){
    var W=800,H=240,PL=60,PR=20,PB=30,PT=20;
    var cW=W-PL-PR,cH=H-PT-PB;
    /* Quarterly data points */
    var quarters=[];var cumRev=0,cumDeals=0;
    yearData.forEach(function(yr){
      for(var q=0;q<4;q++){
        cumRev+=yr.rev/4;cumDeals+=yr.capture/4;
        quarters.push({label:'Y'+yr.year+'Q'+(q+1),cumRev:cumRev,cumDeals:cumDeals});
      }
    });
    var maxCum=quarters[quarters.length-1].cumRev||1;
    var niceMax=maxCum;
    if(niceMax>1e6)niceMax=Math.ceil(niceMax/1e6)*1e6;
    var xStep=cW/(quarters.length-1);
    var points=quarters.map(function(q,i){
      return (PL+i*xStep)+','+(PT+cH*(1-q.cumRev/niceMax));
    }).join(' ');
    var areaPoints=(PL)+','+(PT+cH)+' '+points+' '+(PL+(quarters.length-1)*xStep)+','+(PT+cH);
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',display:'block'}},
      /* Grid */
      [0,.25,.5,.75,1].map(function(f){
        var y=PT+cH*(1-f);
        return h('g',{key:'g'+f},
          h('line',{x1:PL,x2:W-PR,y1:y,y2:y,stroke:'#f0f0f0',strokeWidth:1}),
          h('text',{x:PL-6,y:y+3,textAnchor:'end',fontSize:8,fill:'#bbb'},fmtD(Math.round(niceMax*f)))
        );
      }),
      /* Area fill */
      h('polygon',{points:areaPoints,fill:'#059669',opacity:.1}),
      /* Line */
      h('polyline',{points:points,fill:'none',stroke:'#059669',strokeWidth:2.5,strokeLinejoin:'round'}),
      /* Dots + labels at year boundaries */
      [3,7,11].map(function(qi){
        var q=quarters[qi];if(!q)return null;
        var x=PL+qi*xStep;
        var y=PT+cH*(1-q.cumRev/niceMax);
        return h('g',{key:qi},
          h('circle',{cx:x,cy:y,r:4,fill:'#059669',stroke:'#fff',strokeWidth:2}),
          h('text',{x:x,y:y-10,textAnchor:'middle',fontSize:10,fontWeight:700,fill:'#059669'},fmtD(q.cumRev)),
          h('text',{x:x,y:PT+cH+14,textAnchor:'middle',fontSize:9,fontWeight:600,fill:'#888'},'Year '+(Math.floor(qi/4)+1))
        );
      }),
      /* X-axis line */
      h('line',{x1:PL,x2:W-PR,y1:PT+cH,y2:PT+cH,stroke:'#ddd',strokeWidth:1})
    );
  }

  /* ── Top Industry Breakdown Table ── */
  function renderIndustryTable(){
    var top6=byInd.slice(0,6);
    return h('div',null,
      top6.map(function(ind,i){
        var yr3Lease=Math.round(ind.count*0.4278);
        var yr3Cap=Math.round(yr3Lease*(captureRate/100));
        var yr3Rev=yr3Cap*ind.deal;
        var pctOfTotal=capturableRev>0?Math.round(yr3Rev/capturableRev*100):0;
        var barW=Math.max(pctOfTotal,2);
        return h('div',{key:ind.id,style:{display:'grid',gridTemplateColumns:'140px 80px 80px 80px 1fr',gap:8,alignItems:'center',
          padding:'8px 0',borderBottom:i<top6.length-1?'1px solid #f5f5f5':'none'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            h('div',{style:{width:8,height:8,borderRadius:'50%',background:ind.c,flexShrink:0}}),
            h('span',{style:{fontSize:11,fontWeight:600,color:'#333'}},ind.l)
          ),
          h('div',{style:{fontSize:11,color:'#666',textAlign:'right'}},fmt(yr3Lease)),
          h('div',{style:{fontSize:11,color:'#333',fontWeight:600,textAlign:'right'}},fmt(yr3Cap)),
          h('div',{style:{fontSize:11,color:'#059669',fontWeight:700,textAlign:'right'}},fmtD(yr3Rev)),
          h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            h('div',{style:{flex:1,height:6,background:'#f5f5f5',borderRadius:3,overflow:'hidden'}},
              h('div',{style:{width:barW+'%',height:'100%',background:ind.c,borderRadius:3}})
            ),
            h('span',{style:{fontSize:9,fontWeight:600,color:'#999',minWidth:28}},pctOfTotal+'%')
          )
        );
      })
    );
  }

  /* ═══ MAIN RETURN ═══ */
  return h('div',null,
    /* Header */
    h('div',{style:{marginBottom:10}},
      h('h1',{style:{fontSize:22,fontWeight:700,letterSpacing:'-.02em',marginBottom:4}},'Forecasting'),
      h('p',{style:{fontSize:12,color:'#888'}},'3-year market share planning horizon. How much of this market can Work_Space realistically capture?')
    ),

    /* ═══ FILTER BAR ═══ */
    h('div',{style:{position:'sticky',top:0,zIndex:20,background:'#f8f9fa',border:'1px solid #eee',borderRadius:10,padding:'12px 16px',marginBottom:6,boxShadow:'0 2px 8px rgba(0,0,0,.05)'}},
      h('div',{style:{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}},
        h('div',{style:{minWidth:0}},

              var active=(tags.provs||[]).indexOf(pv.id)>=0;
              return h('button',{key:pv.id,onClick:function(){toggleDimTag('provs',pv.id);},
                style:{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:600,border:'1px solid '+(active?'#059669':'#e5e5e5'),
                  background:active?'#059669':'#fff',color:active?'#fff':'#888',cursor:'pointer',transition:'all .15s'}},
                pv.id
              );
            })
          )
        ),

        /* Industries */
        h('div',{style:{marginBottom:10}},
          h('div',{style:{fontSize:10,fontWeight:600,color:'#555',marginBottom:5}},'Industry'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
            INDUSTRIES.map(function(ind){
              var active=(tags.inds||[]).indexOf(ind.id)>=0;
              return h('button',{key:ind.id,onClick:function(){toggleDimTag('inds',ind.id);},
                style:{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:600,border:'1px solid '+(active?ind.c:'#e5e5e5'),
                  background:active?ind.c:'#fff',color:active?'#fff':'#888',cursor:'pointer',transition:'all .15s'}},
                ind.s
              );
            })
          )
        ),

        /* Buyer Concerns */
        h('div',{style:{marginBottom:10}},
          h('div',{style:{fontSize:10,fontWeight:600,color:'#555',marginBottom:5}},'Buyer Concerns'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
            CONCERNS.map(function(cn){
              var active=(tags.concerns||[]).indexOf(cn.id)>=0;
              return h('button',{key:cn.id,onClick:function(){toggleDimTag('concerns',cn.id);},
                style:{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:600,border:'1px solid '+(active?cn.c:'#e5e5e5'),
                  background:active?cn.c:'#fff',color:active?'#fff':'#888',cursor:'pointer',transition:'all .15s'}},
                cn.l
              );
            })
          )
        ),

        /* Plan tag */
        h('div',null,
          h('button',{onClick:togglePlanTag,
            style:{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:600,border:'1px solid '+(tags.plan?'#ea580c':'#e5e5e5'),
              background:tags.plan?'#ea580c':'#fff',color:tags.plan?'#fff':'#888',cursor:'pointer',transition:'all .15s'}},
            tags.plan?'✓ Flagged for Plan':'Flag for Plan'
          )
        )
      ),

      /* Tag summary pills */
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:4,marginBottom:16}},
        [{l:typ?typ.l:null,c:typ?typ.c:'#999'},{l:dir?dir.l:null,c:dir?dir.c:'#999'},
         {l:(TFS.find(function(t){return t.id===item.timeframe;})||{}).l,c:'#64748b'},
         {l:(CTRL.find(function(t){return t.id===item.control;})||{}).l,c:'#64748b'},
         {l:(STGS.find(function(t){return t.id===item.stage;})||{}).l,c:'#64748b'},
         {l:(CONF.find(function(t){return t.id===item.confidence;})||{}).l,c:'#64748b'}
        ].concat(
          (tags.sizes||[]).map(function(sid){
            var sz=BIZ_SIZES.find(function(s){return s.id===sid;});
            return sz?{l:sz.l+' emp',c:'#2563eb'}:null;
          }).filter(Boolean)
        ).concat(
          (tags.provs||[]).map(function(pid){
            var pv=PROVS.find(function(p){return p.id===pid;});
            return pv?{l:pv.id,c:'#059669'}:null;
          }).filter(Boolean)
        ).concat(
          (tags.inds||[]).map(function(iid){
            var ind=INDUSTRIES.find(function(i){return i.id===iid;});
            return ind?{l:ind.s,c:ind.c}:null;
          }).filter(Boolean)
        ).concat(
          (tags.concerns||[]).map(function(cid){
            var cn=CONCERNS.find(function(c){return c.id===cid;});
            return cn?{l:cn.l,c:cn.c}:null;
          }).filter(Boolean)
        ).concat(
          tags.plan?[{l:'Plan',c:'#ea580c'}]:[]
        ).map(function(tag,i){if(!tag||!tag.l)return null;return h('span',{key:i,style:{fontSize:9,fontWeight:600,color:tag.c,background:tag.c+'12',padding:'2px 6px',borderRadius:4}},tag.l);})
      ),

      h('div',{style:{display:'flex',justifyContent:'space-between',paddingTop:12,borderTop:'1px solid #f0f0f0'}},
        h('button',{onClick:function(){del(item.id);},style:{fontSize:11,fontWeight:500,color:'#dc2626',border:'1px solid #fecaca',borderRadius:6,padding:'6px 12px',background:'#fff'}},'Delete Item'),
        h('button',{onClick:close,style:{fontSize:11,fontWeight:600,color:'#fff',border:'none',borderRadius:6,padding:'6px 16px',background:'#111'}},'Done')
      )
    )
  );
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
